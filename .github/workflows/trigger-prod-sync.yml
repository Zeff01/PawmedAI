name: Trigger Production Sync

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger fork sync workflow
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.FORK_SYNC_TOKEN }}" \
          https://api.github.com/repos/jpdevdotcom/pawmed-ai-prod/dispatches \
          -d '{"event_type":"sync-upstream"}'
